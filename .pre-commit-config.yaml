repos:
  - repo: local
    hooks:
      - id: go-build
        name: go build
        language: system
        entry: go build ./...
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        language: system
        entry: go test ./...
        types: [go]
        pass_filenames: false

      - id: go-fmt
        name: go fmt
        language: system
        entry: gofmt -l -w
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --fix
        types: [go]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
